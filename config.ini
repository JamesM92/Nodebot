[rns]
# Reticulum config directory. Leave blank to use the default (~/.reticulum).
# NodeBot will auto-connect to NomadNet's (or rnsd's) shared RNS instance
# if one is running. No special setting needed for standard NomadNet installs.
# config_dir =

[bot]
name = NodeBot
# Storage path for LXMF identity and messages. ~ expands to home directory.
storage_path = ~/.nodebot/lxmf_storage

[admin]
# Comma or space-separated LXMF addresses that are permanently trusted as admin.
# Leave blank to use password-only login.
addresses =
# Plaintext password - hashed on load. CHANGE THIS before deploying.
password = changeme

[meshcore]
# Serial port for the MeshCore radio. The installer creates a stable udev
# symlink at /dev/meshcore0 so this path survives USB reconnects.
port = /dev/meshcore0
baudrate = 115200

[plugins]
# Seconds a plugin function is allowed to run before it is killed.
# Increase if you have plugins that do database or network I/O (e.g. weewx).
timeout_sec = 5
# Minimum seconds between plugin directory scans for hot-reload.
scan_interval = 5
